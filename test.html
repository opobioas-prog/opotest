<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OpoTest – Configurar test</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <header id="appHeader"></header>

  <main class="max-w-2xl mx-auto px-4 pt-4 pb-32 space-y-5">

    <!-- Número de preguntas -->
    <div>
      <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Nº de preguntas</h2>
      <div class="grid grid-cols-4 gap-2" id="cantidadBtns">
        <button data-val="20"    onclick="setCantidad(20)"    class="cantidad-btn activo py-3 rounded-xl text-sm font-medium border-2 border-indigo-600 bg-indigo-600 text-white transition-colors">20</button>
        <button data-val="40"    onclick="setCantidad(40)"    class="cantidad-btn py-3 rounded-xl text-sm font-medium border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 transition-colors">40</button>
        <button data-val="60"    onclick="setCantidad(60)"    class="cantidad-btn py-3 rounded-xl text-sm font-medium border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 transition-colors">60</button>
        <button data-val="todas" onclick="setCantidad('todas')" class="cantidad-btn py-3 rounded-xl text-sm font-medium border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 transition-colors">Todas</button>
      </div>
    </div>

    <!-- Toggle incluir eliminadas -->
    <button onclick="toggleElim()"
      class="w-full flex items-center justify-between px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 transition-colors"
      id="elimBtn">
      <span class="text-sm text-gray-700 dark:text-gray-300">Incluir preguntas eliminadas</span>
      <div id="elimToggle" class="w-10 h-6 rounded-full bg-gray-200 dark:bg-gray-600 relative transition-colors">
        <div id="elimDot" class="absolute w-5 h-5 bg-white rounded-full top-0.5 left-0.5 shadow transition-transform"></div>
      </div>
    </button>

    <!-- Selección de temas -->
    <div>
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-300">
          Temas <span id="selCount" class="text-indigo-600 dark:text-indigo-400">(0)</span>
        </h2>
        <button onclick="toggleTodos()" class="text-xs text-indigo-600 dark:text-indigo-400 font-medium">Seleccionar todo</button>
      </div>

      <!-- Filtro grupos -->
      <div id="gruposFiltro" class="flex gap-2 overflow-x-auto pb-2 -mx-4 px-4 mb-3"></div>

      <!-- Spinner -->
      <div id="spinner" class="flex justify-center py-8"><div class="spinner"></div></div>

      <!-- Grupos colapsables -->
      <div id="temasContainer" class="hidden space-y-3"></div>

      <!-- Empty -->
      <div id="emptyTemas" class="hidden text-center py-8">
        <p class="text-gray-400 text-sm">No hay temas con preguntas.<br>Importa datos primero.</p>
        <a href="./importar.html" class="inline-block mt-3 text-indigo-600 text-sm font-medium">Ir a Importar →</a>
      </div>
    </div>

  </main>

  <!-- Botón iniciar (sticky) -->
  <div class="fixed bottom-16 left-0 right-0 px-4 py-3 bg-gradient-to-t from-gray-50 dark:from-gray-900 to-transparent pointer-events-none">
    <div class="max-w-2xl mx-auto pointer-events-auto">
      <button id="btnIniciar" onclick="iniciarTest()"
        class="w-full min-h-[52px] bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 disabled:pointer-events-none text-white font-bold text-base rounded-2xl shadow-lg transition-colors flex items-center justify-center gap-2"
        disabled>
        <span>▶</span>
        <span id="btnLabel">Selecciona al menos un tema</span>
        <div id="spinnerBtn" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
      </button>
    </div>
  </div>

  <nav id="bottomNav"></nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="./js/config.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/layout.js"></script>
  <script src="./js/shuffle.js"></script>
  <script>
    let temas         = []
    let seleccionados = new Set()
    let cantidad      = 20
    let incluirElim   = false
    let grupoFiltro   = ''
    let expandido     = {}

    (async () => {
      await requireAuth()
      initLayout('dashboard', 'Configurar test', './dashboard.html')

      const preselect = getParam('temas')
      await cargarTemas()
      if (preselect) { seleccionados.add(preselect); renderTemas() }
    })()

    async function cargarTemas() {
      try {
        const { data } = await db.from('temas')
          .select('*, preguntas_count:preguntas(count)')
          .order('grupo').order('codigo')

        temas = (data || []).map(t => ({
          ...t,
          preguntas_count: t.preguntas_count?.[0]?.count ?? 0,
        })).filter(t => t.preguntas_count > 0)

        renderGrupos()
        renderTemas()
      } catch (e) { toast('Error al cargar temas', 'error') }
      finally { document.getElementById('spinner').classList.add('hidden') }
    }

    function renderGrupos() {
      const grupos = [...new Set(temas.map(t => t.grupo))]
      if (grupos.length <= 1) return
      const cont = document.getElementById('gruposFiltro')
      cont.innerHTML = ['', ...grupos].map(g => `
        <button onclick="setGrupo('${g}')" data-grupo="${g}"
          class="shrink-0 px-3 py-1.5 rounded-full text-xs font-medium transition-colors
            ${g === grupoFiltro ? 'bg-indigo-600 text-white' : 'bg-gray-100 dark:bg-gray-800 text-gray-500'}">
          ${g || 'Todos'}
        </button>`).join('')
    }

    function setGrupo(g) {
      grupoFiltro = g
      document.querySelectorAll('#gruposFiltro button').forEach(b => {
        b.className = `shrink-0 px-3 py-1.5 rounded-full text-xs font-medium transition-colors
          ${b.dataset.grupo === g ? 'bg-indigo-600 text-white' : 'bg-gray-100 dark:bg-gray-800 text-gray-500'}`
      })
      renderTemas()
    }

    function renderTemas() {
      const filtrados = grupoFiltro ? temas.filter(t => t.grupo === grupoFiltro) : temas
      const cont = document.getElementById('temasContainer')
      const empty = document.getElementById('emptyTemas')

      if (temas.length === 0) { empty.classList.remove('hidden'); return }
      empty.classList.add('hidden')
      cont.classList.remove('hidden')

      const porGrupo = filtrados.reduce((acc, t) => { (acc[t.grupo]=acc[t.grupo]||[]).push(t); return acc }, {})

      cont.innerHTML = Object.entries(porGrupo).map(([grupo, gTemas]) => {
        const todos   = gTemas.every(t => seleccionados.has(t.id))
        const alguno  = gTemas.some(t => seleccionados.has(t.id))
        const isOpen  = expandido[grupo] !== false
        const nSel    = gTemas.filter(t => seleccionados.has(t.id)).length
        return `
          <div class="border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden">
            <div class="flex items-center gap-3 px-4 py-3 bg-gray-50 dark:bg-gray-800">
              <input type="checkbox" ${todos ? 'checked' : ''} ${alguno && !todos ? 'data-indeterminate="true"' : ''}
                onchange="toggleGrupo('${grupo}')"
                class="w-4 h-4 shrink-0 rounded accent-indigo-600">
              <span class="flex-1 text-sm font-semibold text-gray-800 dark:text-gray-200 cursor-pointer"
                onclick="toggleExpand('${grupo}')">${grupo}</span>
              <span class="text-xs text-gray-400">${nSel}/${gTemas.length}</span>
              <button onclick="toggleExpand('${grupo}')" class="text-gray-400 text-sm">${isOpen ? '▲' : '▼'}</button>
            </div>
            ${isOpen ? `
              <div class="divide-y divide-gray-100 dark:divide-gray-700">
                ${gTemas.map(t => `
                  <label class="flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800/50">
                    <input type="checkbox" ${seleccionados.has(t.id) ? 'checked' : ''}
                      onchange="toggleTema('${t.id}')" class="w-4 h-4 shrink-0 accent-indigo-600">
                    <span class="flex-1 text-sm text-gray-700 dark:text-gray-300 leading-snug">
                      <span class="font-mono text-xs text-gray-400 mr-1">${t.codigo}</span>${t.tema}
                    </span>
                    <span class="text-xs text-gray-400 shrink-0">${t.preguntas_count}</span>
                  </label>`).join('')}
              </div>` : ''}
          </div>`
      }).join('')

      // Aplicar indeterminate via JS
      document.querySelectorAll('[data-indeterminate="true"]').forEach(el => { el.indeterminate = true })
      actualizarBoton()
    }

    function toggleExpand(grupo) {
      expandido[grupo] = expandido[grupo] === false ? true : false
      renderTemas()
    }

    function toggleTema(id) {
      seleccionados.has(id) ? seleccionados.delete(id) : seleccionados.add(id)
      renderTemas()
    }

    function toggleGrupo(grupo) {
      const gTemas = temas.filter(t => t.grupo === grupo)
      const todos  = gTemas.every(t => seleccionados.has(t.id))
      gTemas.forEach(t => todos ? seleccionados.delete(t.id) : seleccionados.add(t.id))
      renderTemas()
    }

    function toggleTodos() {
      const filtrados = grupoFiltro ? temas.filter(t => t.grupo === grupoFiltro) : temas
      const todos = filtrados.every(t => seleccionados.has(t.id))
      filtrados.forEach(t => todos ? seleccionados.delete(t.id) : seleccionados.add(t.id))
      renderTemas()
    }

    function setCantidad(val) {
      cantidad = val
      document.querySelectorAll('.cantidad-btn').forEach(btn => {
        const active = String(btn.dataset.val) === String(val)
        btn.className = `cantidad-btn py-3 rounded-xl text-sm font-medium border-2 transition-colors
          ${active ? 'border-indigo-600 bg-indigo-600 text-white' : 'border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300'}`
      })
      actualizarBoton()
    }

    function toggleElim() {
      incluirElim = !incluirElim
      document.getElementById('elimToggle').classList.toggle('bg-orange-500', incluirElim)
      document.getElementById('elimToggle').classList.toggle('bg-gray-200', !incluirElim)
      document.getElementById('elimToggle').classList.toggle('dark:bg-gray-600', !incluirElim)
      document.getElementById('elimDot').style.transform = incluirElim ? 'translateX(16px)' : ''
    }

    function actualizarBoton() {
      const selArr = Array.from(seleccionados)
      document.getElementById('selCount').textContent = `(${selArr.length})`
      const totalDisp = temas.filter(t => seleccionados.has(t.id)).reduce((s,t) => s+(t.preguntas_count||0), 0)
      const nTest = cantidad === 'todas' ? totalDisp : Math.min(totalDisp, cantidad)
      const btn   = document.getElementById('btnIniciar')
      btn.disabled = selArr.length === 0 || nTest === 0
      document.getElementById('btnLabel').textContent = selArr.length > 0 && nTest > 0
        ? `Iniciar test · ${nTest} preguntas`
        : 'Selecciona al menos un tema'
    }

    async function iniciarTest() {
      if (seleccionados.size === 0) return
      document.getElementById('btnIniciar').disabled = true
      document.getElementById('spinnerBtn').classList.remove('hidden')

      try {
        const temasIds = Array.from(seleccionados)
        let query = db.from('preguntas').select('*').in('tema_id', temasIds).eq('activa', true)
        if (!incluirElim) query = query.eq('eliminada', false)
        const { data: preguntas, error } = await query
        if (error) throw error
        if (!preguntas?.length) { toast('No hay preguntas disponibles', 'warning'); return }

        const mezcladas = shuffle(preguntas)
        const recorte   = cantidad === 'todas' ? mezcladas : mezcladas.slice(0, cantidad)

        const { data: intento, error: e2 } = await db.from('intentos_test')
          .insert({ temas_ids: temasIds, completado: false })
          .select().single()
        if (e2) throw e2

        guardarSesion({ intentoId: intento.id, preguntas: recorte, currentIndex: 0, respuestas: {}, startedAt: new Date().toISOString() })
        window.location.href = `./test-activo.html?id=${intento.id}`
      } catch (e) {
        toast('Error: ' + e.message, 'error')
        document.getElementById('btnIniciar').disabled = false
        document.getElementById('spinnerBtn').classList.add('hidden')
      }
    }
  </script>
</body>
</html>
